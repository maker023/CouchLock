<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #0A0B10;
  --ink: #0D0F1C;
  --accent: #4F52E0;
  --accent-rgb: 79,82,224;
  --accent-light: #6366F1;
  --teal: #16A37F;
  --teal-rgb: 22,163,127;
  --font-d: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --font-m: 'DM Mono', monospace;
  --ease-mag: cubic-bezier(0.22, 1, 0.36, 1);
}
body {
  width: 320px;
  min-height: 200px;
  background: var(--void);
  color: white;
  font-family: var(--font-b);
  -webkit-font-smoothing: antialiased;
}
.popup { padding: 20px; }

/* Header */
.brand {
  font-family: var(--font-d);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.brand span { color: var(--accent); }
.tagline {
  font-family: var(--font-m);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.15);
  margin-bottom: 20px;
}

/* Status */
.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 999px;
  margin-bottom: 20px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.status-dot.connected {
  background: var(--teal);
  box-shadow: 0 0 8px rgba(var(--teal-rgb),0.5);
}
.status-dot.connecting {
  background: var(--accent);
  animation: blink 1s steps(1) infinite;
}
@keyframes blink {
  0%, 60% { opacity: 1; }
  65% { opacity: 0.3; }
  80% { opacity: 1; }
}
.status-text {
  font-family: var(--font-m);
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.5px;
}

/* QR Area */
.qr-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 24px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.04);
  border-radius: 24px;
  margin-bottom: 16px;
}
.qr-label {
  font-family: var(--font-m);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(var(--accent-rgb),0.4);
}
#qr-canvas {
  border-radius: 12px;
  background: white;
  padding: 8px;
}
.qr-hint {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.2);
  text-align: center;
  line-height: 1.5;
}

/* Paired state */
.paired-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 20px;
  background: rgba(var(--teal-rgb),0.06);
  border: 1px solid rgba(var(--teal-rgb),0.1);
  border-radius: 24px;
  margin-bottom: 16px;
}
.paired-title {
  font-family: var(--font-d);
  font-size: 15px;
  font-weight: 700;
  color: rgba(255,255,255,0.8);
}
.paired-detail {
  font-family: var(--font-m);
  font-size: 10px;
  font-weight: 500;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.5px;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 999px;
  font-family: var(--font-d);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 150ms var(--ease-mag);
}
.btn:hover { opacity: 0.85; }
.btn-accent {
  background: var(--accent);
  color: white;
  box-shadow: 0 0 24px rgba(var(--accent-rgb),0.3);
}
.btn-ghost {
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.4);
  border: 1px solid rgba(255,255,255,0.06);
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="popup">
  <div class="brand">Couch<span>Lock</span></div>
  <div class="tagline">YOUR PHONE. YOUR REMOTE.</div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Initializing...</div>
  </div>

  <!-- Unpaired state -->
  <div id="unpaired">
    <div class="qr-area">
      <div class="qr-label">Scan to connect</div>
      <canvas id="qr-canvas" width="160" height="160"></canvas>
      <div class="qr-hint">Open your phone camera and scan this code to connect.</div>
    </div>
    <button class="btn btn-ghost" id="btn-new-session">Generate New Code</button>
  </div>

  <!-- Paired state -->
  <div id="paired" class="hidden">
    <div class="paired-info">
      <div class="paired-title">Phone connected</div>
      <div class="paired-detail" id="paired-session">Session: ---</div>
    </div>
    <button class="btn btn-ghost" id="btn-disconnect">Disconnect &amp; New Session</button>
  </div>
</div>

<script src="qrcode.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
